# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update France Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *' # Escalonado: Áustria (:00), Austrália (:15), França (:30)

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install curl_cffi requests

      - name: Rodar fetcher do SofaScore (França) com retry
        run: |
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            echo "=== Tentativa $RETRY de $MAX_RETRIES ==="
            
            # Tournament 34 (Ligue 1), Season 77356 (2025/2026)
            python proxy_sofascore_fetcher.py --tournament 34 --season 77356 && {
              SUCCESS=true
              break
            }
            
            echo "Tentativa $RETRY falhou. Aguardando 30s antes de tentar novamente..."
            sleep 30
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ TODAS AS TENTATIVAS FALHARAM! O SofaScore bloqueou o acesso."
            echo "   Os dados do servidor NÃO serão alterados (proteção contra dados vazios)."
            exit 1
          fi
          
          echo "✅ Dados coletados com sucesso!"

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_france.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # 1. LIMPEZA PREVENTIVA: Remove partidas da França 2026
            ./venv/bin/python manage.py shell -c "from matches.models import Match, League, Season; l=League.objects.filter(name='Ligue 1', country='Franca').first(); s=Season.objects.filter(year=2026).first(); Match.objects.filter(league=l, season=s).delete() if l and s else None; print('Limpeza da França 2026 concluída.')"

            # 2. Importa o payload
            ./venv/bin/python manage.py import_sofascore_payload --file payload_france.json --league_name 'Ligue 1' --country 'Franca' --season_year 2026
            
            # 3. Une times e Recalcula
            ./venv/bin/python manage.py merge_duplicate_teams
            ./venv/bin/python manage.py recalculate_standings --league_name 'Ligue 1' --country 'Franca' --season_year 2026
            
            # Limpa cache e rastros
            ./venv/bin/python manage.py shell -c "from django.core.cache import cache; cache.clear()"
            rm payload_france.json
          EOF
