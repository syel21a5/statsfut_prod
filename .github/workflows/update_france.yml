# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update France Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *' # Escalonado: Áustria (:00), Austrália (:15), França (:30)

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.1.7

      - name: Configurar Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install curl_cffi requests

      - name: Rodar fetcher do SofaScore (França)
        run: |
          # Tournament 34 (Ligue 1), Season 77356 (2025/2026)
          python proxy_sofascore_fetcher.py --tournament 34 --season 77356

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_france.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # Importa o payload usando Nome da Liga e País (mais seguro que ID fixo)
            ./venv/bin/python manage.py import_sofascore_payload --file payload_france.json --league_name 'Ligue 1' --country 'Franca' --season_year 2026
            
            # Limpa duplicatas de times que o payload pode ter criado (Monaco FC, PSG FC etc)
            ./venv/bin/python scripts/cleanup_france_teams.py
            
            # Sincroniza os IDs dos logos para todos os 18 times
            ./venv/bin/python update_ligue1_ids.py
            
            # Recalcula e limpa
            ./venv/bin/python manage.py recalculate_standings --league_name 'Ligue 1' --country 'Franca' --smart
            
            # Limpa cache
            ./venv/bin/python manage.py shell -c "from django.core.cache import cache; cache.clear()"
            
            rm payload_france.json
          EOF
