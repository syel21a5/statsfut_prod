# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Belgium Pro League

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4.1.7

      - name: Configurar Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install curl_cffi requests

      - name: Rodar fetcher do SofaScore (Bélgica)
        run: |
          # Tournament 38 (Pro League), Season 77040 (2025/2026)
          python proxy_sofascore_fetcher.py --tournament 38 --season 77040

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_belgium.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # Importa o payload
            ./venv/bin/python manage.py import_sofascore_payload --file payload_belgium.json --league_name 'Pro League' --country 'Belgica' --season_year 2026
            
            # Recalcula e limpa
            ./venv/bin/python manage.py recalculate_standings --league_name 'Pro League' --country 'Belgica' --smart
            
            # Limpa cache
            ./venv/bin/python manage.py shell -c "from django.core.cache import cache; cache.clear()"
            
            rm payload_belgium.json
          EOF
