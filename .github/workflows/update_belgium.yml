name: Update Belgium Pro League

on:
  schedule:
    - cron: '15 */6 * * *'  # Every 6 hours at :15
  workflow_dispatch:

jobs:
  update-belgium:
    runs-on: ubuntu-latest
    env:
      SSH_KEY: ${{ secrets.PROD_SERVER_SSH_KEY }}
      SSH_HOST: ${{ secrets.PROD_SERVER_HOST }}
      SSH_USER: ${{ secrets.PROD_SERVER_USER }}
    steps:
      - name: Checkout statsfut
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Run Remote Update
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST << 'EOF'
            cd /www/wwwroot/statsfut.com
            source venv/bin/activate
            # Pro League Belgium: Tournament 38, Season 77040 (2025/26)
            python proxy_sofascore_fetcher.py --tournament 38 --season 77040
            python manage.py import_sofascore_payload --file payload.json --league_name "Pro League" --country "Belgica" --season_year 2026
            python manage.py recalculate_standings --league_name "Pro League" --country "Belgica" --season_year 2026 --smart
            python manage.py shell -c "from django.core.cache import cache; cache.clear()"
          EOF
