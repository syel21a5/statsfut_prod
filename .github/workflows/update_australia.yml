name: Update Australia Data

on:
  schedule:
    # Roda a cada 6 horas, no minuto 15 para não congestionar com a Áustria (minuto 0)
    - cron: '15 */6 * * *'
  workflow_dispatch:  # Permite roda manualmente via botão no GitHub

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django requests curl_cffi python-dotenv

    - name: Run Scraper (SQLite In-Memory / File)
      env:
        DJANGO_SETTINGS_MODULE: core.settings_ci
      run: |
        # Roda as migrações no banco local SQLite (só memória ou github runner)
        python manage.py migrate
        
        # Roda o scraper
        python manage.py scrape_sofascore_australia

    - name: Export and Upload
      env:
        DJANGO_SETTINGS_MODULE: core.settings_ci
        # Configurado via GitHub Secrets!
        PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
        PROD_SERVER_USER: root
        PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
      run: |
        # Configura chave SSH para conexão ao servidor
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Exporta e envia os dados ao servidor
        python export_australia_fixture.py
