# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Austria Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Reduzi de 15 para 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar uv (Instalador Ultra Rápido)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/requirements.txt"

      - name: Configurar Python e Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências (Super Rápido com uv)
        run: |
          uv pip install --system curl_cffi requests

      - name: WARP (Apenas se necessário ou sempre para segurança)
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Rodar fetcher do SofaScore (Áustria)
        run: |
          # Tournament 45 (Austrian Bundesliga), Season 77382 (2025/2026)
          python proxy_sofascore_fetcher.py --tournament 45 --season 77382
          
      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_austria.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # Importa os dados
            ./venv/bin/python manage.py import_sofascore_payload --file payload_austria.json --league_name 'Bundesliga' --country 'Austria' --season_year 2026
            
            # Recalcula as posições e limpa duplicatas
            ./venv/bin/python manage.py merge_duplicate_teams
            ./venv/bin/python manage.py recalculate_standings --league_name 'Bundesliga' --country 'Austria' --season_year 2026
            
            # Limpa rastros
            rm payload_austria.json
          EOF
