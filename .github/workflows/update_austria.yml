# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Austria Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Cloudflare WARP (VPN Grátis para burlar bloqueio)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp+
          warp-cli --accept-tos connect
          sleep 5
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep warp

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install curl_cffi requests

      - name: Rodar fetcher do SofaScore (Áustria) com retry
        run: |
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            echo "=== Tentativa $RETRY de $MAX_RETRIES ==="
            
            # Tournament 45 (Austrian Bundesliga), Season 77382 (2025/2026)
            python proxy_sofascore_fetcher.py --tournament 45 --season 77382 && {
              SUCCESS=true
              break
            }
            
            echo "Tentativa $RETRY falhou. Aguardando 30s antes de tentar novamente..."
            sleep 30
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ TODAS AS TENTATIVAS FALHARAM! O SofaScore bloqueou o acesso."
            echo "   Os dados do servidor NÃO serão alterados (proteção contra dados vazios)."
            exit 1
          fi
          
          echo "✅ Dados coletados com sucesso!"

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_austria.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # Importa os dados
            ./venv/bin/python manage.py import_sofascore_payload --file payload_austria.json --league_name 'Bundesliga' --country 'Austria' --season_year 2026
            
            # Recalcula as posições e limpa duplicatas
            ./venv/bin/python manage.py merge_duplicate_teams
            ./venv/bin/python manage.py recalculate_standings --league_name 'Bundesliga' --country 'Austria' --season_year 2026
            
            # Limpa rastros
            rm payload_austria.json
          EOF
