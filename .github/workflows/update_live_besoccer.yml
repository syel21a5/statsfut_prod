# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Live Scores via BeSoccer

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install curl_cffi requests beautifulsoup4

      - name: Rodar Scraper BeSoccer com retry
        run: |
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            echo "=== Tentativa $RETRY de $MAX_RETRIES ==="
            
            python scrape_besoccer_live_payload.py && {
              SUCCESS=true
              break
            }
            
            echo "Tentativa $RETRY falhou. Aguardando 10s..."
            sleep 10
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ TODAS AS TENTATIVAS FALHARAM!"
            exit 1
          fi
          
          echo "✅ Scraper finalizado com sucesso!"

      - name: Enviar para Produção e Processar
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Verifica se o payload tem conteúdo (não é lista vazia [])
          PAYLOAD_SIZE=$(stat -c%s payload_besoccer.json 2>/dev/null || echo "0")
          PAYLOAD_CONTENT=$(cat payload_besoccer.json 2>/dev/null || echo "[]")

          if [ "$PAYLOAD_CONTENT" = "[]" ] || [ "$PAYLOAD_SIZE" -lt 10 ]; then
            echo "Nenhum jogo ao vivo encontrado no momento. Pulando deploy."
            exit 0
          fi

          echo "Enviando $PAYLOAD_SIZE bytes de dados para produção..."

          # Upload do payload
          scp -o StrictHostKeyChecking=no payload_besoccer.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_besoccer.json

          # Executa o comando remoto para importar os dados
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main

            # Importa o placar ao vivo
            ./venv/bin/python manage.py import_besoccer_payload --file payload_besoccer.json

            # Limpa o cache para mostrar os novos placares imediatamente
            ./venv/bin/python manage.py shell -c "from django.core.cache import cache; cache.clear()"

            # Remove o arquivo temporário
            rm payload_besoccer.json
          EOF
