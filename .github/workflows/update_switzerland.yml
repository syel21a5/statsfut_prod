name: Update Switzerland Super League

on:
  schedule:
    - cron: '30 */6 * * *'  # Every 6 hours at :30
  workflow_dispatch:

jobs:
  update-switzerland:
    runs-on: ubuntu-latest
    env:
      SSH_KEY: ${{ secrets.PROD_SERVER_SSH_KEY }}
      SSH_HOST: ${{ secrets.PROD_SERVER_HOST }}
      SSH_USER: ${{ secrets.PROD_SERVER_USER }}
    steps:
      - name: Checkout statsfut
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Run Remote Update
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST << 'EOF'
            cd /var/www/statsfut
            source venv/bin/activate
            # Super League Switzerland: Tournament 215, Season 77152
            python proxy_sofascore_fetcher.py --tournament 215 --season 77152
            python manage.py import_sofascore_payload --file payload.json --league_id 42 --season_year 2026
            python manage.py recalculate_standings --league_name "Super League" --country "Suica" --season_year 2026
            python manage.py clear_cache
          EOF
