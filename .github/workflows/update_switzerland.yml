# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Switzerland Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '50 */6 * * *'

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          uv pip install --system curl_cffi requests

      - name: WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Rodar fetcher (Suíça)
        run: |
          # Tournament 36 (Super League), Season 82603 (2025/2026)
          python proxy_sofascore_fetcher.py --tournament 36 --season 82603 --last-rounds 4

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_switzerland.json
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            ./venv/bin/python manage.py import_sofascore_payload --file payload_switzerland.json --league_name 'Super League' --country 'Suica' --season_year 2026
            ./venv/bin/python manage.py merge_duplicate_teams
            ./venv/bin/python manage.py recalculate_standings --league_name 'Super League' --country 'Suica' --season_year 2026
            rm payload_switzerland.json
          EOF
