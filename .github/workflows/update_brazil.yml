# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Brazil Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */6 * * *'

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar uv (Instalador Ultra Rápido)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Configurar Python e Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências (Super Rápido com uv)
        run: |
          uv pip install --system curl_cffi requests

      - name: WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Rodar fetcher do SofaScore (Brasil)
        run: |
          # Tournament 325 (Brasileirão), Season 87678 (2026)
          python proxy_sofascore_fetcher.py --tournament 325 --season 87678 --last-rounds 4

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_brazil.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # Importa os dados (Sem deletar nada antes!)
            ./venv/bin/python manage.py import_sofascore_payload --file payload_brazil.json --league_name 'Brasileirão' --country 'Brasil' --season_year 2026
            
            # Une times e Recalcula
            ./venv/bin/python manage.py merge_duplicate_teams
            ./venv/bin/python manage.py recalculate_standings --league_name 'Brasileirão' --country 'Brasil' --season_year 2026
            
            # Limpa rastros
            rm payload_brazil.json
          EOF
