# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update Brazil Data via SofaScore

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */6 * * *' # Escalonado: Áustria (:00), Austrália (:15), França (:30), Brasil (:45)

jobs:
  proxy-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4


      - name: WARP
        uses: fscarmen/warp-on-actions@v1.2
        with:
          stack: dual

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install curl_cffi requests

      - name: Rodar fetcher do SofaScore (Brasil)
        run: |
          # Tournament 325 (Brasileirão), Season 87678 (2026)

                    MAX_RETRIES=3

                    RETRY=0

                    SUCCESS=false

                    

                    while [ $RETRY -lt $MAX_RETRIES ]; do

                      RETRY=$((RETRY + 1))

                      echo "=== Tentativa $RETRY de $MAX_RETRIES ==="

                      

                      python proxy_sofascore_fetcher.py --tournament 325 --season 87678 && {

                        SUCCESS=true

                        break

                      }

                      

                      echo "Tentativa $RETRY falhou. Aguardando 30s antes de tentar novamente..."

                      sleep 30

                    done

                    

                    if [ "$SUCCESS" = false ]; then

                      echo "❌ TODAS AS TENTATIVAS FALHARAM! O SofaScore bloqueou o acesso."

                      echo "   Os dados do servidor NÃO serão alterados (proteção contra dados vazios)."

                      exit 1

                    fi

                    

                    echo "✅ Dados coletados com sucesso!"

      - name: Enviar payload e processar na VPS
        env:
          PROD_SERVER_HOST: ${{ secrets.PROD_SERVER_HOST }}
          PROD_SERVER_USER: root
          PROD_SERVER_PATH: ${{ secrets.PROD_SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Upload do arquivo
          scp -o StrictHostKeyChecking=no payload.json $PROD_SERVER_USER@$PROD_SERVER_HOST:$PROD_SERVER_PATH/payload_brazil.json

          # Comando SSH remoto
          ssh -o StrictHostKeyChecking=no $PROD_SERVER_USER@$PROD_SERVER_HOST << 'EOF'
            cd ${{ secrets.PROD_SERVER_PATH }}
            git pull origin main
            
            # Importa o payload usando Nome da Liga e País
            ./venv/bin/python manage.py import_sofascore_payload --file payload_brazil.json --league_name 'Brasileirão' --country 'Brasil' --season_year 2026
            
            # Limpa duplicatas de times e jogos
            ./venv/bin/python manage.py merge_duplicate_teams
            ./venv/bin/python scripts/cleanup_match_duplicates.py
            
            # Recalcula e limpa
            ./venv/bin/python manage.py recalculate_standings --league_name 'Brasileirão' --country 'Brasil' --smart
            
            # Limpa cache
            ./venv/bin/python manage.py shell -c "from django.core.cache import cache; cache.clear()"
            
            rm payload_brazil.json
          EOF
